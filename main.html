  function findKey(k, lst, value) {
    for (var i=0; i<lst.length; i++) {
      if (lst[i][k] === value) {
        return lst[i];
      }
    }
    return -1;
  }

  function main() {
    // last game
    var lastGame = games[games.length - 1];
    document.getElementsByTagName('h3')[0].innerHTML = '<b>Date: </b>' + lastGame['date'];
    var host = findKey('id', players, lastGame['host']);
    document.getElementsByTagName('h3')[1].innerHTML = '<b>Host: </b>' + host['name'];

    var lastGameRanking = document.getElementById('last-game-ranking');
    for (var i=0; i<lastGame['ranking'].length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, lastGame['ranking'][i]['id']);
      newPlayer.innerHTML = '<b>' + player['name'] + '</b> <span class="green">+' + lastGame['ranking'][i]['profit'] + '€</span> <span class="red">-' + lastGame['ranking'][i]['loss'] + '€</span> <span class="blue">' + lastGame['ranking'][i]['rebuys'] + ' rebuys</span>';
      lastGameRanking.appendChild(newPlayer);
    }

    // winners 
    var winnersList = document.getElementById('winners-list');
    for (let game of games) {
      const newWinner = document.createElement('li');
      var winner = findKey('id', players, game['ranking'][0]['id']);
      newWinner.innerHTML = game['date'] + ' <b>' + winner['name'] + '</b> ' + game['ranking'][0]['profit'] + '€</b>';
      winnersList.appendChild(newWinner);
    }

    // total games
    var totalGames = document.getElementById('total-games');
    totalGames.innerHTML = 'Number of games played: ' + games.length;

    var allTimeEarnings = [];
    var gamesWon = []
    var itms = [];
    var appearances = [];
    var gamesHosted = [];
    var allTimeProfits = [];

    for (var i=0; i<games.length; i++) {
      var host = findKey('id', gamesHosted, games[i]['host']);
      if (host === -1) {
        gamesHosted.push({
          'id': games[i]['host'],
          'gamesHosted': 1
        });
      } else {
        host['gamesHosted']++;
      }
      var playerGamesWon = findKey('id', gamesWon, games[i]['ranking'][0]['id']);
      if (playerGamesWon === -1) {
        gamesWon.push({
          'id': games[i]['ranking'][0]['id'],
          'gamesWon': 1
        });
      } else {
        playerGamesWon['gamesWon']++;
      }
      for (var j=0; j<games[i]['ranking'].length; j++) {
        var playerAppearance = findKey('id', appearances, games[i]['ranking'][j]['id']);
        if (playerAppearance === -1) {
          appearances.push({
            'id': games[i]['ranking'][j]['id'],
            'appearances': 1
          });
        } else {
          playerAppearance['appearances']++;
        }
        if (games[i]['ranking'][j]['profit'] !== 0) {
          var playerEarnings = findKey('id', allTimeEarnings, games[i]['ranking'][j]['id']);
          if (playerEarnings === -1) {
            allTimeEarnings.push({
              'id': games[i]['ranking'][j]['id'],
              'earnings': games[i]['ranking'][j]['profit']
            });
          } else {
            playerEarnings['earnings'] += games[i]['ranking'][j]['profit'];
          }
        }
        if (games[i]['ranking'][j]['profit'] !== 0) {
          var playerItm = findKey('id', itms, games[i]['ranking'][j]['id']);
          if (playerItm === -1) {
            itms.push({
              'id': games[i]['ranking'][j]['id'],
              'itms': 1
            });
          } else {
            playerItm['itms']++;
          }
        }
        var playerProfit = findKey('id', allTimeProfits, games[i]['ranking'][j]['id']);
          if (playerProfit === -1) {
            allTimeProfits.push({
              'id': games[i]['ranking'][j]['id'],
              'profit': games[i]['ranking'][j]['profit'] - games[i]['ranking'][j]['loss']
            });
          } else {
            playerProfit['profit'] += games[i]['ranking'][j]['profit'] - games[i]['ranking'][j]['loss'];
          }
      }
    }
    gamesHosted.sort((first, second) => {
      return second['gamesHosted'] - first['gamesHosted'];
    });
    appearances.sort((first, second) => {
      return second['appearances'] - first['appearances'];
    });
    allTimeEarnings.sort((first, second) => {
      return second['earnings'] - first['earnings'];
    });
    gamesWon.sort((first, second) => {
      return second['gamesWon'] - first['gamesWon'];
    });
    itms.sort((first, second) => {
      return second['itms'] - first['itms'];
    });
    allTimeProfits.sort((first, second) => {
      return second['profit'] - first['profit'];
    });
    var gamesHostedElement = document.getElementById('games-hosted');
    for (var i=0; i<gamesHosted.length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, gamesHosted[i]['id']);
      newPlayer.innerHTML = '<b>' + player['name'] + '</b> ' + gamesHosted[i]['gamesHosted'];
      gamesHostedElement.appendChild(newPlayer);
    }
    var appearancesElement = document.getElementById('appearances');
    for (var i=0; i<appearances.length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, appearances[i]['id']);
      newPlayer.innerHTML = '<b>' + player['name'] + '</b> ' + appearances[i]['appearances'];
      appearancesElement.appendChild(newPlayer);
    }
    var earningsElement = document.getElementById('earnings');
    for (var i=0; i<allTimeEarnings.length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, allTimeEarnings[i]['id']);
      newPlayer.innerHTML = '<b>' + player['name'] +'</b> <span class="green">' + allTimeEarnings[i]['earnings'] + '€</span>';
      earningsElement.appendChild(newPlayer);
    }
    var gamesWonElement = document.getElementById('games-won');
    for (var i=0; i<gamesWon.length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, gamesWon[i]['id']);
      newPlayer.innerHTML = '<b>' + player['name'] +'</b> ' + gamesWon[i]['gamesWon'];
      gamesWonElement.appendChild(newPlayer);
    }
    var itmsElement = document.getElementById('itms');
    for (var i=0; i<itms.length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, itms[i]['id']);
      newPlayer.innerHTML = '<b>' + player['name'] +'</b> ' + itms[i]['itms'];
      itmsElement.appendChild(newPlayer);
    }
    var profitElement = document.getElementById('profit');
    for (var i=0; i<allTimeProfits.length; i++) {
      const newPlayer = document.createElement('li');
      var player = findKey('id', players, allTimeProfits[i]['id']);
      if (allTimeProfits[i]['profit'] >= 0) {
        newPlayer.innerHTML = '<b>' + player['name'] +'</b> <span class="green">+' + allTimeProfits[i]['profit'] + '€</span>';
      } else {
        newPlayer.innerHTML = '<b>' + player['name'] +'</b> <span class="red">' + allTimeProfits[i]['profit'] + '€</span>';
      }
      
      profitElement.appendChild(newPlayer);
    }
